version: '3.9'

services:
  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=AIIntegratedCRM_Dev;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;
    ports:
      - "5000:80"
      - "5001:443"
    volumes:
      - ./logs:/app/logs

  sqlserver:
    ports:
      - "1433:1433"

  redis:
    ports:
      - "6379:6379"
